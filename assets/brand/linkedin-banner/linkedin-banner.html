<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1584">
<title>Domus AI — LinkedIn Banner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@300;400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:          #0d0d0b;
    --bg-alt:      #111110;
    --bg-surface:  #181816;
    --card-cream:  #f0ead8;
    --card-cream-2:#e7dfc8;
    --text:        #f0ead8;
    --text-dark:   #141410;
    --text-muted:  #8c857a;
    --text-dim:    #4a4742;
    --gold:        #c8922a;
    --gold-light:  #dfb05a;
    --gold-deep:   #a87915;
    --serif:       "DM Serif Display", Georgia, serif;
    --sans:        "DM Sans", system-ui, sans-serif;
    --mono:        "IBM Plex Mono", "Courier New", monospace;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1584px;
    height: 396px;
    overflow: hidden;
    background: var(--bg);
    font-family: var(--sans);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .banner {
    position: relative;
    width: 1584px;
    height: 396px;
    overflow: hidden;
    background: var(--bg);
  }

  /* ── Atmosphere: soft warm glows spread across banner ── */
  .atmosphere {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 680px 460px at 88% 32%, rgba(200,146,42,0.11) 0%, transparent 68%),
      radial-gradient(ellipse 520px 360px at 78% 86%, rgba(200,146,42,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Subtle gold dot-grid over full banner ── */
  .dot-grid {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(200,146,42,0.18) 1px, transparent 1px);
    background-size: 34px 34px;
    opacity: 0.35;
    pointer-events: none;
    z-index: 1;
    mask-image: linear-gradient(90deg, transparent 0%, transparent 18%, rgba(0,0,0,0.45) 40%, rgba(0,0,0,0.7) 70%, rgba(0,0,0,0.4) 100%);
    -webkit-mask-image: linear-gradient(90deg, transparent 0%, transparent 18%, rgba(0,0,0,0.45) 40%, rgba(0,0,0,0.7) 70%, rgba(0,0,0,0.4) 100%);
  }

  /* ── Thin gold hairline framing the right edge ── */
  .edge-accent {
    position: absolute;
    top: 48px;
    bottom: 48px;
    right: 72px;
    width: 1px;
    background: linear-gradient(
      to bottom,
      transparent 0%,
      rgba(200,146,42,0.35) 30%,
      rgba(200,146,42,0.35) 70%,
      transparent 100%
    );
    z-index: 2;
  }

  /* ── Content: right-aligned, occupies right half ── */
  .content {
    position: absolute;
    top: 0;
    right: 0;
    width: 1180px;
    height: 100%;
    padding: 58px 112px 52px 60px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    gap: 28px;
    align-items: flex-end;
    text-align: right;
    z-index: 3;
  }

  /* ── Headline ── */
  .headline {
    font-family: var(--serif);
    font-size: 58px;
    line-height: 1.14;
    color: var(--text);
    letter-spacing: -0.015em;
    font-weight: 400;
  }

  .accent-wrap {
    position: relative;
    display: inline-block;
    padding-right: 4px;
  }

  .accent {
    color: var(--gold);
    font-style: italic;
    font-family: var(--serif);
  }

  /* Hand-drawn gold swoosh under "l'IA" */
  .swoosh {
    position: absolute;
    bottom: -16px;
    left: -6px;
    width: 148px;
    height: 30px;
    overflow: visible;
    pointer-events: none;
  }

  /* ── Logo card ── */
  .logos-wrap {
    display: flex;
    justify-content: flex-end;
    align-items: center;
  }

  .logos-card {
    display: flex;
    align-items: stretch;
    background: linear-gradient(180deg, var(--card-cream) 0%, var(--card-cream-2) 100%);
    border: 1px solid rgba(200,146,42,0.28);
    border-radius: 2px;
    box-shadow:
      0 2px 0 rgba(200,146,42,0.08),
      0 18px 50px rgba(0,0,0,0.45),
      inset 0 1px 0 rgba(255,255,255,0.25);
    overflow: hidden;
  }

  .logo-cell {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 13px 17px;
    border-right: 1px solid rgba(20,20,16,0.09);
    background: transparent;
  }

  .logo-cell:last-child {
    border-right: none;
  }

  .logo-mark {
    flex-shrink: 0;
    display: block;
    width: 22px;
    height: 22px;
  }

  .logo-name {
    font-family: var(--sans);
    font-weight: 500;
    font-size: 15px;
    color: var(--text-dark);
    letter-spacing: -0.003em;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div class="banner">

  <div class="atmosphere"></div>
  <div class="dot-grid"></div>
  <div class="edge-accent"></div>

  <div class="content">

    <!-- Headline -->

      <span class="accent-wrap">
        <span class="accent">l&rsquo;IA</span>

          <path
            d="M 4 18 C 22 8, 55 6, 90 10 C 110 12, 130 15, 143 22"
            stroke="url(#swooshGrad)"

            stroke-width="2.5"

      au service des<br>
      agences immobilières
